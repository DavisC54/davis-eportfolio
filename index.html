<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davis — ENC1102 ePortfolio</title>
<style>
  :root { --bg:#fbfbf9; --text:#1c1c1c; --muted:#666; --line:#e2e2dd; --link:#3b5bdb; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 100px 24px 80px; }
  header { border-bottom: 1px solid var(--line); padding-bottom: 28px; margin-bottom: 28px; }
  h1 { font-size: 2.4rem; margin: 0 0 6px; letter-spacing: -0.02em; }
  .course { color: var(--muted); font-size: 1rem; margin: 0; }
  p { font-size: 1.05rem; }
  .note { color: var(--muted); }
  footer { margin-top: 60px; color: var(--muted); font-size: 0.85rem; }
  a { color: var(--link); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Davis</h1>
      <p class="course">ENC1102 — Composition II · ePortfolio</p>
    </header>

    <main>
      <p>Welcome to my ENC1102 ePortfolio.</p>
      <p class="note">This site is in progress and will be updated throughout the semester as I add my research, artifacts, and reflections.</p>
    </main>

    <footer>
      &copy; 2026 Davis
    </footer>
  </div>
</body>
</html>
